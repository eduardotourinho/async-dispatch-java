<svg width="1160" height="940" viewBox="0 0 1160 940" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .th  { font-size: 13px; font-weight: 500; fill: #1a1a18; }
    .ts  { font-size: 11px; font-weight: 400; fill: #44433f; }
    .tb  { fill: #0C447C; } .tb2 { fill: #185FA5; }
    .tt  { fill: #085041; } .tt2 { fill: #0F6E56; }
    .tp  { fill: #3C3489; } .tp2 { fill: #534AB7; }
    .ta  { fill: #633806; }
    .tc  { fill: #712B13; } .tc2 { fill: #993C1D; }
    .tg  { fill: #444441; }
    .edge     { fill: none; stroke: #73726c; stroke-width: 1.2; }
    .edge-dlq { fill: none; stroke: #73726c; stroke-width: 1.2; stroke-dasharray: 5 3; }
    .dash     { stroke-dasharray: 5 3; fill: none; stroke: #b4b2a9; stroke-width: 0.8; }
  </style>
</defs>

<rect width="1160" height="940" fill="#f8f7f4" rx="12"/>

<!-- Task Manager boundary -->
<rect class="dash" x="20" y="118" width="320" height="490" rx="12"/>
<text class="ts" x="180" y="135" text-anchor="middle" dominant-baseline="central">Task Manager</text>
<rect x="34" y="150" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="170" text-anchor="middle" dominant-baseline="central">TaskController</text>
<rect x="34" y="210" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="230" text-anchor="middle" dominant-baseline="central">TaskManager</text>
<rect x="34" y="270" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="290" text-anchor="middle" dominant-baseline="central">TaskService</text>
<rect x="34" y="330" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="350" text-anchor="middle" dominant-baseline="central">TaskProducer</text>
<rect x="34" y="410" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="430" text-anchor="middle" dominant-baseline="central">TaskResultsSqsListener</text>
<rect x="34" y="470" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="490" text-anchor="middle" dominant-baseline="central">TasksDlqListener</text>
<rect x="34" y="530" width="292" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="180" y="550" text-anchor="middle" dominant-baseline="central">TaskResultsDlqListener</text>

<!-- Task Converter boundary -->
<rect class="dash" x="820" y="118" width="320" height="370" rx="12"/>
<text class="ts" x="980" y="135" text-anchor="middle" dominant-baseline="central">Task Converter</text>
<rect x="834" y="150" width="292" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="980" y="170" text-anchor="middle" dominant-baseline="central">TaskWorkerSqsListener</text>
<rect x="834" y="210" width="292" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="980" y="230" text-anchor="middle" dominant-baseline="central">ConvertCurrencyService</text>
<rect x="834" y="270" width="292" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="980" y="290" text-anchor="middle" dominant-baseline="central">CalculateInterestService</text>
<rect x="834" y="330" width="292" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="980" y="350" text-anchor="middle" dominant-baseline="central">TaskResultProducer</text>

<!-- SQS boundary -->
<rect class="dash" x="420" y="218" width="340" height="490" rx="12"/>
<text class="ts" x="590" y="234" text-anchor="middle" dominant-baseline="central">AWS SQS</text>
<rect x="434" y="252" width="312" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th ta" x="590" y="272" text-anchor="middle" dominant-baseline="central">tasks.fifo</text>
<rect x="434" y="352" width="312" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th tg" x="590" y="372" text-anchor="middle" dominant-baseline="central">tasks-dlq.fifo</text>
<rect x="434" y="452" width="312" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th ta" x="590" y="472" text-anchor="middle" dominant-baseline="central">task-results.fifo</text>
<rect x="434" y="552" width="312" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th tg" x="590" y="572" text-anchor="middle" dominant-baseline="central">task-results-dlq.fifo</text>

<!-- PostgreSQL -->
<rect x="34" y="740" width="292" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th tc" x="180" y="761" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
<text class="ts tc2" x="180" y="780" text-anchor="middle" dominant-baseline="central">Database</text>

<!-- HTTP Client -->
<rect x="490" y="30" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th tb" x="590" y="51" text-anchor="middle" dominant-baseline="central">HTTP Client</text>
<text class="ts tb2" x="590" y="70" text-anchor="middle" dominant-baseline="central">REST</text>

<!-- ARROWS -->

<!-- Client → TaskController -->
<path class="edge" d="M590 82 L590 112 L340 112 L340 170 L328 170" marker-end="url(#arr)"/>
<text class="ts" x="464" y="104" text-anchor="middle" dominant-baseline="central">REST</text>

<!-- TaskController → TaskManager: right-rail x=342 -->
<path class="edge" d="M326 170 L342 170 L342 230 L328 230" marker-end="url(#arr)"/>

<!-- TaskManager → TaskService: right-rail x=346 -->
<path class="edge" d="M326 230 L346 230 L346 290 L328 290" marker-end="url(#arr)"/>

<!-- TaskManager → TaskProducer: right-rail x=352 -->
<path class="edge" d="M326 240 L352 240 L352 350 L328 350" marker-end="url(#arr)"/>

<!-- TaskService → DB: left-rail x=8, outside boundary -->
<path class="edge" d="M34 290 L8 290 L8 766 L34 766" marker-end="url(#arr)"/>
<text class="ts" x="0" y="528" text-anchor="middle" dominant-baseline="central" transform="rotate(-90,0,528)">write</text>

<!-- DB → TaskService: left-rail x=14 -->
<path class="edge" d="M34 758 L14 758 L14 296 L34 296" marker-end="url(#arr)"/>
<text class="ts" x="22" y="390" text-anchor="middle" dominant-baseline="central" transform="rotate(-90,22,390)">read</text>

<!-- TaskProducer → tasks.fifo -->
<path class="edge" d="M326 350 L432 272" marker-end="url(#arr)"/>
<text class="ts" x="400" y="302" text-anchor="middle" dominant-baseline="central">publish</text>

<!-- tasks.fifo -.-> tasks-dlq -->
<path class="edge-dlq" d="M590 292 L590 350" marker-end="url(#arr)"/>
<text class="ts" x="648" y="322" text-anchor="middle" dominant-baseline="central">max retries exceeded</text>

<!-- tasks.fifo → TaskWorkerSqsListener -->
<path class="edge" d="M746 272 L832 170" marker-end="url(#arr)"/>
<text class="ts" x="800" y="212" text-anchor="middle" dominant-baseline="central">consume</text>

<!-- TaskWorkerSqsListener → ConvertCurrencyService: left-rail x=814 -->
<path class="edge" d="M834 170 L814 170 L814 230 L834 230" marker-end="url(#arr)"/>

<!-- TaskWorkerSqsListener → CalculateInterestService: right-rail x=1142 -->
<path class="edge" d="M1126 170 L1142 170 L1142 290 L1128 290" marker-end="url(#arr)"/>

<!-- ConvertCurrencyService → TaskResultProducer: left-rail x=814 -->
<path class="edge" d="M834 230 L814 230 L814 350 L834 350" marker-end="url(#arr)"/>

<!-- CalculateInterestService → TaskResultProducer: right-rail x=1142 -->
<path class="edge" d="M1128 290 L1142 290 L1142 350 L1128 350" marker-end="url(#arr)"/>

<!-- TaskResultProducer → task-results.fifo -->
<path class="edge" d="M832 350 L748 472" marker-end="url(#arr)"/>
<text class="ts" x="806" y="404" text-anchor="middle" dominant-baseline="central">publish</text>

<!-- task-results.fifo -.-> task-results-dlq -->
<path class="edge-dlq" d="M590 492 L590 550" marker-end="url(#arr)"/>
<text class="ts" x="648" y="522" text-anchor="middle" dominant-baseline="central">max retries exceeded</text>

<!-- task-results.fifo → TaskResultsSqsListener: right-rail x=358 -->
<path class="edge" d="M432 462 L358 462 L358 430 L328 430" marker-end="url(#arr)"/>
<text class="ts" x="392" y="444" text-anchor="middle" dominant-baseline="central">consume</text>

<!-- TaskResultsSqsListener → TaskService: right-rail x=354 -->
<path class="edge" d="M326 420 L354 420 L354 290 L328 290" marker-end="url(#arr)"/>

<!-- tasks-dlq → TasksDlqListener: right-rail x=362 -->
<path class="edge" d="M432 372 L362 372 L362 490 L328 490" marker-end="url(#arr)"/>
<text class="ts" x="392" y="364" text-anchor="middle" dominant-baseline="central">consume</text>

<!-- TasksDlqListener → TaskService: right-rail x=356 -->
<path class="edge" d="M326 480 L356 480 L356 300 L328 300" marker-end="url(#arr)"/>

<!-- task-results-dlq → TaskResultsDlqListener: right-rail x=366 -->
<path class="edge" d="M432 572 L366 572 L366 550 L328 550" marker-end="url(#arr)"/>
<text class="ts" x="396" y="562" text-anchor="middle" dominant-baseline="central">consume</text>

<!-- LEGEND -->
<rect x="20" y="808" width="1120" height="118" rx="10" fill="#eeecea" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="580" y="826" text-anchor="middle" dominant-baseline="central">Legend</text>

<rect x="40"  y="842" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="ts" x="60"  y="849" dominant-baseline="central">HTTP Client</text>
<rect x="180" y="842" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="200" y="849" dominant-baseline="central">Task Manager</text>
<rect x="340" y="842" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="ts" x="360" y="849" dominant-baseline="central">Task Converter</text>
<rect x="510" y="842" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="ts" x="530" y="849" dominant-baseline="central">SQS queue</text>
<rect x="650" y="842" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="670" y="849" dominant-baseline="central">Dead-letter queue (DLQ)</text>
<rect x="870" y="842" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text class="ts" x="890" y="849" dominant-baseline="central">Database</text>

<line x1="40"  y1="890" x2="100" y2="890" stroke="#73726c" stroke-width="1.2" marker-end="url(#arr)"/>
<text class="ts" x="108" y="890" dominant-baseline="central">Sync / direct call</text>
<line x1="320" y1="890" x2="380" y2="890" stroke="#73726c" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text class="ts" x="388" y="890" dominant-baseline="central">Max retries exceeded → DLQ</text>
<line x1="680" y1="884" x2="740" y2="884" stroke="#73726c" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="740" y1="896" x2="680" y2="896" stroke="#73726c" stroke-width="1.2" marker-end="url(#arr)"/>
<text class="ts" x="748" y="890" dominant-baseline="central">Bidirectional (read / write)</text>
</svg>
