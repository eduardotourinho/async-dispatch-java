spring.application.name=async-dispatch

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/async_dispatch
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# AWS Configuration
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test
spring.cloud.aws.endpoint=http://localhost:4566

# SQS Configuration
spring.cloud.aws.sqs.enabled=true
spring.cloud.aws.sqs.endpoint=http://localhost:4566
spring.cloud.aws.sqs.tasks-queue-url=http://localhost:4566/000000000000/tasks.fifo
spring.cloud.aws.sqs.task-results-queue-url=http://localhost:4566/000000000000/task-results.fifo
spring.cloud.aws.sqs.tasks-dlq-queue-url=http://localhost:4566/000000000000/tasks-dlq.fifo
spring.cloud.aws.sqs.task-results-dlq-queue-url=http://localhost:4566/000000000000/task-results-dlq.fifo

spring.docker.compose.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.info.java.enabled=true
management.info.build.enabled=true

info.app.name=async-dispatch
info.app.description=Distributed async task processing system using AWS SQS FIFO queues and PostgreSQL
info.app.version=0.0.1

# Springdoc / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
