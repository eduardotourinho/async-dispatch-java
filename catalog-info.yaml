apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: async-dispatch-api
  description: Task processing API for submitting and retrieving distributed tasks (currency conversion, interest calculation).
  tags:
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: user:default/eduardo-tourinho
  system: async-dispatch
  definition: |
    openapi: "3.0.3"
    info:
      title: Async Dispatch Task API
      description: >
        REST API for submitting async tasks (currency conversion, interest
        calculation) to SQS FIFO queues and retrieving their results from
        PostgreSQL once processing is complete.
      version: "1.0.0"
    paths:
      /api/tasks:
        post:
          summary: Submit a new async task
          description: >
            Enqueues a new task onto the tasks.fifo SQS queue for asynchronous
            processing. Returns the generated task ID immediately; poll
            GET /api/tasks/{taskId} to retrieve the result.
          operationId: enqueueTask
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TaskRequest'
          responses:
            '201':
              description: Task accepted and enqueued successfully.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/TaskResponse'
            '400':
              description: Invalid request body (missing or malformed fields).
            '500':
              description: Internal server error — task could not be enqueued.
      /api/tasks/{taskId}:
        get:
          summary: Get task status and result
          description: >
            Returns the current status and, when processing is complete, the
            result of a previously submitted task.
          operationId: getTask
          parameters:
            - name: taskId
              in: path
              required: true
              description: UUID of the task returned by POST /api/tasks.
              schema:
                type: string
                format: uuid
          responses:
            '200':
              description: Task found — returns status and result (if available).
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/TaskResult'
            '404':
              description: No task found with the given taskId.
            '500':
              description: Internal server error.
    components:
      schemas:
        TaskRequest:
          type: object
          required:
            - type
            - payload
          properties:
            type:
              $ref: '#/components/schemas/TaskType'
            payload:
              type: object
              description: >
                Input data for the task.
                For CONVERT_CURRENCY: amount (number), fromCurrency (string), toCurrency (string).
                For CALCULATE_INTEREST: principal (number), annualRate (number), days (integer).
              additionalProperties: true
        TaskResponse:
          type: object
          properties:
            taskId:
              type: string
              format: uuid
              description: Unique identifier assigned to the newly created task.
        TaskResult:
          type: object
          properties:
            id:
              type: string
              format: uuid
              description: Unique task identifier.
            type:
              $ref: '#/components/schemas/TaskType'
            payload:
              type: object
              description: Original payload submitted with the task.
              additionalProperties: true
            status:
              $ref: '#/components/schemas/TaskStatus'
            result:
              type: string
              description: >
                Output produced by the task processor. Present only when
                status is COMPLETED.
              nullable: true
        TaskType:
          type: string
          description: Identifies the kind of computation to perform.
          enum:
            - CONVERT_CURRENCY
            - CALCULATE_INTEREST
        TaskStatus:
          type: string
          description: Lifecycle state of the task.
          enum:
            - PENDING
            - COMPLETED
            - CANCELLED
