apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: async-dispatch
  description: Distributed task processing system using Spring Boot, AWS SQS FIFO queues, and PostgreSQL.
  annotations:
    github.com/project-slug: eduardotourinho/async-dispatch
    backstage.io/techdocs-ref: dir:.
  links:
    - url: https://github.com/eduardotourinho/async-dispatch
      title: GitHub
      icon: github
  tags:
    - java
    - spring-boot
    - aws-sqs
    - postgresql
spec:
  type: service
  owner: user:default/eduardo-tourinho
  lifecycle: experimental
  providesApis:
    - async-dispatch-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: async-dispatch-api
  description: Task processing API for submitting and retrieving distributed tasks (currency conversion, interest calculation).
  tags:
    - rest
spec:
  type: openapi
  lifecycle: experimental
  owner: user:default/eduardo-tourinho
  definition: |
    openapi: "3.0.0"
    info:
      title: Async Dispatch Task API
      version: "1.0"
    paths:
      /api/tasks:
        post:
          summary: Submit a new task
          operationId: enqueueTask
      /api/tasks/{taskId}:
        get:
          summary: Get task status and result
          operationId: getTask
